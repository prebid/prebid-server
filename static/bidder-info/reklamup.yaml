aliasOf: "teqblaze"
endpoint: "https://node.reklamup.com/pserver"
maintainer:
  email: "support@reklamup.com"
capabilities:
  site:
    mediaTypes:
      - banner
      - video
      - native
  app:
    mediaTypes:
      - banner
      - video
      - native
userSync:
  redirect:
    url: "https://usersync.reklamup.com/pbserver?gdpr={{.GDPR}}&gdpr_consent={{.GDPRConsent}}&us_privacy={{.USPrivacy}}&gpp={{.GPP}}&gpp_sid={{.GPPSID}}&redir={{.RedirectURL}}"
    userMacro: "[UID]"
  iframe:
    url: "https://usersync.reklamup.com/pbserverIframe?gdpr={{.GDPR}}&gdpr_consent={{.GDPRConsent}}&us_privacy={{.USPrivacy}}&gpp={{.GPP}}&gpp_sid={{.GPPSID}}&pbserverUrl={{.RedirectURL}}"
    userMacro: "[UID]"
