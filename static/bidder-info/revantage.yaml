endpoint: "https://bid.revantage.io/bid"
geoscope:
  - global
maintainer:
  email: prebid@revantage.io
modifyingVastXmlAllowed: false
capabilities:
  app:
    mediaTypes:
      - banner
      - video
  site:
    mediaTypes:
      - banner
      - video
userSync:
  iframe:
    url: "https://sync.revantage.io/sync?gdpr={{.GDPR}}&gdpr_consent={{.GDPRConsent}}&us_privacy={{.USPrivacy}}&gpp={{.GPP}}&gpp_sid={{.GPPSID}}&r={{.RedirectURL}}"
    userMacro: "$UID"
  redirect:
    url: "https://sync.revantage.io/sync?tag=img&gdpr={{.GDPR}}&gdpr_consent={{.GDPRConsent}}&us_privacy={{.USPrivacy}}&gpp={{.GPP}}&gpp_sid={{.GPPSID}}&r={{.RedirectURL}}"
    userMacro: "$UID"
