# The {{.Host}} macro is filled per-request from the bidder's region (and optional partner)
# params — each validated as a single DNS host-label and interpolated as a subdomain of the
# fixed .floxis.tech base domain; request-supplied hostnames are never used. The seat query
# param is appended in code (not a standard macro).
endpoint: "https://{{.Host}}/pbs"
maintainer:
  email: prebid@floxis.tech
gvlVendorID: 1609
modifyingVastXmlAllowed: false
openrtb:
  version: 2.6
  gpp-supported: true
capabilities:
  app:
    mediaTypes:
      - banner
      - video
      - native
      - audio
  site:
    mediaTypes:
      - banner
      - video
      - native
      - audio
userSync:
  redirect:
    url: "https://px-us-e.floxis.tech/sync?gdpr={{.GDPR}}&gdpr_consent={{.GDPRConsent}}&gpp={{.GPP}}&gpp_sid={{.GPPSID}}&us_privacy={{.USPrivacy}}&dest={{.RedirectURL}}"
    userMacro: "${USER_ID}"
